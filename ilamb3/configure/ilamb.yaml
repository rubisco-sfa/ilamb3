Cryosphere:

  Snow Cover:

    CCI-CryoClim-FSC-1:
      sources:
        snc: CCI-CryoClim-FSC-1/snc_mon_Snow-cci_BE_gn_198201-201906.nc
      variable_cmap: BuPu

  Permafrost Extent:

    Brown2002:
      sources:
        permafrost_extent: permafrost/Brown2002/Brown2002.nc
      transforms:
      - select_time:
          vmin: 1960-01
          vmax: 1993-01
      - select_lat:
          vmin: 30.
          vmax: 90.
      - permafrost_extent:
          method: slater2013
      analyses:
      - Area Comparison

    Obu2018:
      sources:
        permafrost_extent: permafrost/Obu2018/Obu2018.nc
      transforms:
      - select_time:
          vmin: 2000-01
          vmax: 2016-01
      - select_lat:
          vmin: -10.
          vmax: 90.
      - permafrost_extent:
          method: slater2013
      analyses:
      - Area Comparison

  Active Layer Thickness:

    CALM:
      sources:
        active_layer_thickness: active_layer_thickness/CALM/CALM_1990-2024.nc
      transforms:
      - select_time:
          vmin: 1990-01
          vmax: 2023-01
      - select_lat:
          vmin: 30.
          vmax: 90.
      - active_layer_thickness:
          method: slater2013

Radiation and Energy Cycle:

  Albedo:

    CERES-EBAF-4-2-1:
      analysis_variable: albedo
      sources:
        rsus: CERES-EBAF-4-2-1/obs4MIPs_NASA-LaRC_CERES-EBAF-4-2-1_mon_rsus_gn_v20260302.nc
        rsds: CERES-EBAF-4-2-1/obs4MIPs_NASA-LaRC_CERES-EBAF-4-2-1_mon_rsds_gn_v20260302.nc
      transforms:
      - select_time:
          vmin: 2000-03
          vmax: 2015-01
      - integrate_time:
          varname: rsus
          mean: true
      - integrate_time:
          varname: rsds
          mean: true
      - expression:
          expr: "albedo = rsus / rsds"

    Fluxnet-2015:
      analysis_variable: albedo
      sources:
        rsus: Fluxnet-2015/obs4MIPs_Fluxnet_Fluxnet-2015_mon_rsus_site_v20260302.nc
        rsds: Fluxnet-2015/obs4MIPs_Fluxnet_Fluxnet-2015_mon_rsds_site_v20260302.nc
      transforms:
      - select_time:
          vmin: 1991-01
          vmax: 2015-01
      - integrate_time:
          varname: rsus
