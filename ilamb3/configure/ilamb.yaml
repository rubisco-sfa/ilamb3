    FLUXCOM-1:
      sources:
        hfss: FLUXCOM-1/obs4MIPs_MPI-BGC-BGI_FLUXCOM-1_mon_hfss_gn_v20260302.nc
      variable_cmap: Blues

    WECANN-1-0:
