Ecosystem and Carbon Cycle:

  Biomass:

    Thurner:
      sources:
        biomass: biomass/Thurner/biomass_0.5x0.5.nc
      alternate_vars:
      - cVeg
      variable_cmap: Greens

    XuSaatchi2021:
      sources:
        biomass: biomass/XuSaatchi2021/XuSaatchi.nc
      alternate_vars:
      - cVeg
      variable_cmap: Greens

    USForest:
      sources:
        biomass: biomass/USForest/biomass_0.5x0.5.nc
      alternate_vars:
      - cVeg
      variable_cmap: Greens

    ESACCI:
      sources:
        biomass: biomass/ESACCI/biomass.nc
      alternate_vars:
      - cVeg
      variable_cmap: Greens

    Saatchi2011:
      sources:
        biomass: biomass/Saatchi2011/biomass_0.5x0.5.nc
      alternate_vars:
      - cVeg
      variable_cmap: Greens

    NBCD2000:
      sources:
        biomass: biomass/NBCD2000/biomass_0.5x0.5.nc
      alternate_vars:
      - cVeg
      variable_cmap: Greens

    GEOCARBON:
      sources:
        biomass: biomass/GEOCARBON/biomass.nc
      alternate_vars:
      - cVeg
      variable_cmap: Greens

  Burnt Area:

    GFED-5-0:
      sources:
        burntFractionAll: GFED-5-0/obs4MIPs_NASA-NOSR_GFED-5-0_mon_burntFractionAll_gr_v20260302.nc
      variable_cmap: YlOrBr

  Gross Primary Productivity:

    Fluxnet-2015:
      sources:
        gpp: Fluxnet-2015/obs4MIPs_Fluxnet_Fluxnet-2015_mon_gpp_site_v20260302.nc
      variable_cmap: Greens

    FLUXCOM-1:
      sources:
        gpp: FLUXCOM-1/obs4MIPs_MPI-BGC-BGI_FLUXCOM-1_mon_gpp_gn_v20260302.nc
      relationships:
        pr: pr/GPCPv2.3/pr.nc
        tas: tas/CRU4.02/tas.nc
        rsds: CERES-EBAF-4-2-1/obs4MIPs_NASA-LaRC_CERES-EBAF-4-2-1_mon_rsds_gn_v20260302.nc
      variable_cmap: Greens
      spatial_sum: True
      table_unit: Pg yr-1
      plot_unit: g m-2 d-1

    WECANN-1-0:
      sources:
        gpp: WECANN-1-0/obs4MIPs_ColumbiaU_WECANN-1-0_mon_gpp_gn_v20260302.nc
      relationships:
        pr: pr/GPCPv2.3/pr.nc
        tas: tas/CRU4.02/tas.nc
        rsds: CERES-EBAF-4-2-1/obs4MIPs_NASA-LaRC_CERES-EBAF-4-2-1_mon_rsds_gn_v20260302.nc
      variable_cmap: Greens
      spatial_sum: True
      table_unit: Pg yr-1
      plot_unit: g m-2 d-1

  Leaf Area Index:

    GIMMS_LAI4g:
      sources:
        lai: lai/GIMMS_LAI4g/cao2023_lai.nc
      relationships:
        pr: pr/GPCPv2.3/pr.nc
      variable_cmap: Greens

    AVH15C1:
      sources:
        lai: lai/AVH15C1/lai.nc
      relationships:
        pr: pr/GPCPv2.3/pr.nc
      variable_cmap: Greens

    MODIS:
      sources:
        lai: lai/MODIS/lai_0.5x0.5.nc
      relationships:
        pr: pr/GPCPv2.3/pr.nc
      variable_cmap: Greens

    AVHRR:
      sources:
        lai: lai/AVHRR/lai_0.5x0.5.nc
      relationships:
        pr: pr/GPCPv2.3/pr.nc
      variable_cmap: Greens

  Global Net Ecosystem Carbon Balance:

    Hoffman-1-0:
      sources:
        nbp: Hoffman-1-0/obs4MIPs_UCI-ORNL_Hoffman-1-0_yr_nbp_gm_v20260302.nc
      transforms:
      - integrate_space:
          varname: nbp
      analyses:
      - nbp

    GCP:
      sources:
        nbp: nbp/GCP/nbp_1959-2016.nc
      transforms:
      - integrate_space:
          varname: nbp
      analyses:
      - nbp
      evaluation_year: 2014

  Net Ecosystem Exchange:

    Fluxnet-2015:
      sources:
        nee: Fluxnet-2015/obs4MIPs_Fluxnet_Fluxnet-2015_mon_nee_site_v20260302.nc
      transforms:
      - expression:
          expr: "nee = ra + rh - gpp"
      variable_cmap: Greens

  Ecosystem Respiration:

    Fluxnet-2015:
      sources:
        reco: Fluxnet-2015/obs4MIPs_Fluxnet_Fluxnet-2015_mon_reco_site_v20260302.nc
      transforms:
      - expression:
          expr: "reco = ra + rh"

    FLUXCOM-1:
      sources:
        reco: FLUXCOM-1/obs4MIPs_MPI-BGC-BGI_FLUXCOM-1_mon_reco_gn_v20260302.nc
      transforms:
      - expression:
          expr: "reco = ra + rh"

  Soil Carbon:

    Wang2024:
      sources:
        cSoil: cSoil/Wang2024/wang2024_cSoil.nc

    HWSD-2-0:
      sources:
        cSoil: HWSD-2-0/obs4MIPs_IIASA-FAO_HWSD-2-0_fx_cSoil_gn_v20260302.nc

    NCSCDV22:
      sources:
        cSoilAbove1m: cSoil/NCSCDV22/soilc_0.5x0.5.nc
      alternate_vars:
      - cSoil

  Nitrogen Fixation:

    Davies-Barnard:
      sources:
        fBNF: fBNF/DaviesBarnard/fBNF_0.5x0.5.nc
      variable_cmap: Greens
      spatial_sum: True
      table_unit: Tg yr-1
      plot_unit: kg ha-1 yr-1

Hydrology Cycle:

  Evapotranspiration:

    MOD16A2:
      sources:
        et: evspsbl/MOD16A2/et.nc
      relationships:
        pr: pr/GPCPv2.3/pr.nc
        tas: tas/CRU4.02/tas.nc
      variable_cmap: Blues
      alternate_vars:
      - evspsbl

    MODIS:
      sources:
        et: evspsbl/MODIS/et_0.5x0.5.nc
      relationships:
        pr: pr/GPCPv2.3/pr.nc
        tas: tas/CRU4.02/tas.nc
      variable_cmap: Blues
      alternate_vars:
      - evspsbl

    GLEAMv3.3a:
      sources:
        et: evspsbl/GLEAMv3.3a/et.nc
      relationships:
        pr: pr/GPCPv2.3/pr.nc
        tas: tas/CRU4.02/tas.nc
      variable_cmap: Blues
      alternate_vars:
      - evspsbl

  Evaporative Fraction:

    WECANN-1-0:
      analysis_variable: evapfrac
      sources:
        hfss: WECANN-1-0/obs4MIPs_ColumbiaU_WECANN-1-0_mon_hfss_gn_v20260302.nc
        hfls: WECANN-1-0/obs4MIPs_ColumbiaU_WECANN-1-0_mon_hfls_gn_v20260302.nc
      transforms:
      - select_time:
          vmin: 2007-01
          vmax: 2015-01
      - integrate_time:
          varname: hfss
          mean: true
      - integrate_time:
          varname: hfls
          mean: true
      - expression:
          expr: "evapfrac = hfls / (hfls + hfss)"

    CLASS-1-1:
      analysis_variable: evapfrac
      sources:
        hfss: CLASS-1-1/obs4MIPs_UNSW_CLASS-1-1_mon_hfss_gn_v20260302.nc
        hfls: CLASS-1-1/obs4MIPs_UNSW_CLASS-1-1_mon_hfls_gn_v20260302.nc
      transforms:
      - select_time:
          vmin: 2003-01
          vmax: 2009-12
      - integrate_time:
          varname: hfss
          mean: true
      - integrate_time:
          varname: hfls
          mean: true
      - expression:
          expr: "evapfrac = hfls / (hfls + hfss)"

    Fluxnet-2015:
      analysis_variable: evapfrac
      sources:
        hfss: Fluxnet-2015/obs4MIPs_Fluxnet_Fluxnet-2015_mon_hfss_site_v20260302.nc
        hfls: Fluxnet-2015/obs4MIPs_Fluxnet_Fluxnet-2015_mon_hfls_site_v20260302.nc
      transforms:
      - select_time:
          vmin: 1991-01
          vmax: 2015-01
      - integrate_time:
          varname: hfss
          mean: true
      - integrate_time:
          varname: hfls
          mean: true
      - expression:
          expr: "evapfrac = hfls / (hfls + hfss)"

  Latent Heat:

    Fluxnet-2015:
      sources:
        hfls: Fluxnet-2015/obs4MIPs_Fluxnet_Fluxnet-2015_mon_hfls_site_v20260302.nc
      variable_cmap: Blues

    FLUXCOM-1:
      sources:
        hfls: FLUXCOM-1/obs4MIPs_MPI-BGC-BGI_FLUXCOM-1_mon_hfls_gn_v20260302.nc
      variable_cmap: Blues

    WECANN-1-0:
