      variable_cmap: Blues

    CLASS:
      sources:
        hfss: CLASS-1-1/obs4MIPs_UNSW_CLASS-1-1_mon_hfss_gn_v20260302.nc
      variable_cmap: Blues

  Surface Soil Moisture:

    WangMao:
      sources:
        mrsol: mrsol/WangMao/mrsol_olc.nc
      variable_cmap: Blues
      transforms:
      - soil_moisture_to_vol_fraction
      - select_depth:
          value: 0
      alternate_vars:
      - mrsos

  Soil Moisture 1m:

    WangMao:
      sources:
        mrsol: mrsol/WangMao/mrsol_olc.nc
      variable_cmap: Blues
      transforms:
      - soil_moisture_to_vol_fraction
